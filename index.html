// 高速かつ正確にランダム化する関数（Fisher-Yates Shuffle）
function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

// 画面へ出力

    const qBlock = document.createElement('div');
    qBlock.className = 'question-block';

    const qText = document.createElement('div');
    qText.className = 'question';
    qText.innerHTML = `<span class="meta-tag">[${item.group}]</span>${index + 1}. ${item.q}`;

    const btn = document.createElement('button');
    btn.className = 'btn-show';
    btn.innerText = '答えを見る';
    btn.onclick = () => {
        const ansBox = card.querySelector('.answer-box');
        ansBox.classList.toggle('show');
    };

    const aBox = document.createElement('div');
    aBox.className = 'answer-box';
    aBox.innerText = item.a;

    qBlock.appendChild(qText);
    qBlock.appendChild(btn);
    card.appendChild(qBlock);
    card.appendChild(aBox);

    container.appendChild(card);
});
